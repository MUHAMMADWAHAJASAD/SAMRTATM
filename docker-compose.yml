version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: atm_postgres
    environment:
      POSTGRES_USER: atm_admin
      POSTGRES_PASSWORD: atm_password
      POSTGRES_DB: atm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atm_admin -d atm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: atm_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://atm_admin:atm_password@db:5432/atm_db
      - SECRET_KEY=supersecretjwtkey_12345
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ml/models:/app/models # Mount models for backend to load

  frontend:
    build:
      context: ./frontend
    container_name: atm_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
